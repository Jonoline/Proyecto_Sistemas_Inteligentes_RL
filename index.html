<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Trafico Inteligente — Aprendizaje por Refuerzo</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">

    <!-- ================================================================ -->
    <!-- Panel de autopista (Canvas)                                       -->
    <!-- ================================================================ -->
    <section class="highway-panel">
      <h2>Autopista — Simulación en Tiempo Real</h2>
      <canvas id="highway-canvas"></canvas>
    </section>

    <!-- ================================================================ -->
    <!-- Fila media: gráfico de métricas + consola del agente               -->
    <!-- ================================================================ -->
    <div class="middle-row">

      <!-- Gráfico de métricas -->
      <section class="chart-panel">
        <h2>Métricas de Tráfico</h2>
        <canvas id="chart-canvas"></canvas>
      </section>

      <!-- Consola de decisiones del agente -->
      <section class="agent-panel">
        <h2>Centro de Control — Agente</h2>

        <div class="agent-section">
          <span class="label">Estado observado</span>
          <div id="agent-state">—</div>
        </div>

        <div class="agent-section">
          <span class="label">Acción tomada</span>
          <div id="agent-action">—</div>
        </div>

        <div class="agent-section">
          <span class="label">Recompensa</span>
          <div id="agent-reward">—</div>
        </div>

        <div class="agent-section">
          <span class="label">Estado de la grúa</span>
          <div id="agent-cooldown">—</div>
        </div>

        <div class="agent-section">
          <span class="label">Próxima decisión del agente</span>
          <div id="decision-progress">—</div>
        </div>

        <div class="agent-section">
          <span class="label">Exploración / Explotación</span>
          <div id="agent-epsilon">—</div>
        </div>

        <div class="agent-section">
          <span class="label">Últimas decisiones</span>
          <div id="agent-history">—</div>
        </div>

        <div class="agent-section">
          <span class="label">Politica aprendida (Tabla Q)</span>
          <div id="agent-policy">—</div>
        </div>
      </section>

    </div>

    <!-- ================================================================ -->
    <!-- Barra de controles                                                -->
    <!-- ================================================================ -->
    <section class="controls-bar">

      <!-- Grupo: incidentes -->
      <div class="control-group">
        <label>Incidentes</label>
        <button id="btn-trigger" class="btn-danger" title="Generar un incidente aleatorio">
          Choque
        </button>
        <button id="btn-clear" class="btn-success" title="Despejar incidente manualmente">
          Grúa
        </button>
      </div>

      <span class="divider"></span>

      <!-- Grupo: modo automático -->
      <div class="control-group">
        <button id="btn-auto-incident" title="Activar/desactivar generación automática de incidentes">
          Auto-Incidentes: DESACTIVADO
        </button>
      </div>

      <span class="divider"></span>

      <!-- Grupo: velocidad -->
      <div class="control-group">
        <label>Velocidad</label>
        <select id="speed-select">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="5">5x</option>
          <option value="10">10x</option>
          <option value="20">20x</option>
        </select>
      </div>

      <span class="divider"></span>

      <!-- Recompensa acumulada -->
      <div class="control-group">
        <label>Recompensa total</label>
        <span id="reward-total">0</span>
      </div>

      <span class="divider"></span>

      <!-- Pausa -->
      <div class="control-group">
        <button id="btn-pause" title="Pausar / Continuar simulación">
          ⏸ Pausar
        </button>
        <button id="btn-pause-agent" title="Pausar solo el agente (la simulacion sigue)">
          🧠 Agente: ACTIVADO
        </button>
      </div>

      <span class="divider"></span>

      <!-- Reinicio -->
      <div class="control-group">
        <button id="btn-reset" title="Reiniciar simulacion y Tabla Q">
          Reiniciar Todo
        </button>
      </div>

    </section>

  </div>

  <!-- Módulo principal -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
